<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>kanana — TO-BE 프로토타입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FF6B8A;--pinkl:#FFF0F3;--pink2:#FFD6DF;
  --black:#111;--gray:#6B6B6B;--gray2:#9E9E9E;--lightgray:#F5F5F5;--border:#EBEBEB;
  --white:#fff;--bg:#FAFAFA;
  --blue:#4A90D9;--bluel:#EBF4FF;
  --green:#3DBE7A;--greenl:#EDFAF3;
  --purple:#7B5EA7;--purplel:#F2EEFF;
  --teal:#00B4A6;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--black);font-size:14px}

/* ── 레이아웃 ── */
.app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden;background:var(--white)}

/* ══ 사이드바 ══ */
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

.sb-logo-row{padding:18px 18px 14px;display:flex;align-items:center;gap:8px}
.sb-logo-img{display:flex;align-items:center;gap:6px;cursor:pointer}
.sb-logo-circle{width:22px;height:22px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center}
.sb-logo-circle svg{width:13px;height:13px;fill:#fff}
.sb-logo-text{font-size:17px;font-weight:700;color:var(--black);letter-spacing:-.3px}

.sb-section-label{padding:10px 18px 6px;font-size:11px;color:var(--gray2);font-weight:500}

.sb-list{display:flex;flex-direction:column;overflow-y:auto;flex:1}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.sb-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;border-radius:0;transition:background .1s;position:relative}
.sb-item:hover{background:var(--lightgray)}
.sb-item.active{background:#FFF5F7}
.sb-item-av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.sb-item-info{flex:1;min-width:0}
.sb-item-name{font-size:13px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-preview{font-size:11px;color:var(--gray2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.sb-item-time{font-size:10px;color:var(--gray2);flex-shrink:0;align-self:flex-start;margin-top:2px}

.sb-more-row{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-top:1px solid var(--border)}
.sb-more-label{font-size:12px;color:var(--gray);font-weight:500}
.sb-more-arrow{font-size:13px;color:var(--gray2)}

.sb-promo{margin:8px 10px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#FFE4EC,#FFD0DC);padding:14px;cursor:pointer}
.sb-promo-title{font-size:12px;font-weight:700;color:#C0304A;margin-bottom:3px}
.sb-promo-desc{font-size:11px;color:#C0304A;opacity:.8}

.sb-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-user-av{width:30px;height:30px;border-radius:50%;background:var(--lightgray);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray)}
.sb-user-name{font-size:12px;font-weight:500;color:var(--black)}
.sb-user-id{font-size:10px;color:var(--gray2)}

/* ══ 채팅 메인 ══ */
.chat-main{display:flex;flex-direction:column;overflow:hidden;background:var(--white)}

/* 인트로 화면 */
.intro-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#FFF8FA 0%,#fff 60%);padding:40px 20px 0;position:relative}
.intro-avatar{width:100px;height:100px;border-radius:50%;overflow:hidden;margin-bottom:20px;background:linear-gradient(135deg,#B8D9F0,#7BB8E8);display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.intro-title{font-size:22px;font-weight:700;color:var(--black);text-align:center;line-height:1.45;margin-bottom:30px}
.intro-input-wrap{width:100%;max-width:660px;background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.intro-input{width:100%;border:none;outline:none;font-size:14px;font-family:var(--sans);color:var(--black);background:transparent;resize:none}
.intro-input::placeholder{color:#C8C8C8}
.intro-tool-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.tool-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--gray);cursor:pointer;transition:background .1s;white-space:nowrap}
.tool-btn:hover{background:var(--lightgray)}
.tool-btn svg{width:14px;height:14px;flex-shrink:0}
.tool-attach{padding:5px 7px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--gray);display:flex;align-items:center}
.tool-send{margin-left:auto;width:32px;height:32px;border-radius:50%;background:var(--black);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.tool-send svg{width:14px;height:14px;fill:#fff}
.tool-icons-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.tool-icon-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}

.quick-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center;width:100%;max-width:660px}
.qa-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--gray);cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap}
.qa-btn:hover{background:var(--lightgray)}

.intro-help{position:absolute;bottom:18px;right:20px;display:flex;align-items:center;gap:10px;background:var(--white);border-radius:20px;padding:8px 14px;box-shadow:0 2px 12px rgba(0,0,0,.1);cursor:pointer}
.help-text{font-size:12px;color:var(--black)}
.help-sub{font-size:10px;color:var(--gray2)}
.help-btn{padding:5px 12px;border-radius:20px;background:var(--black);color:var(--white);font-size:12px;font-weight:500;white-space:nowrap}

/* 대화 화면 */
.chat-screen{flex:1;display:none;flex-direction:column;overflow:hidden}
.chat-screen.show{display:flex}

.chat-body{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* 메시지 */
.msg-bot{display:flex;flex-direction:column;gap:4px}
.msg-bot-header{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.msg-bot-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#B8D9F0,#7BB8E8);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-bot-name{font-size:13px;font-weight:500;color:var(--black)}
.msg-bot-text{font-size:14px;color:var(--black);line-height:1.75;max-width:720px}
.msg-bot-text strong{font-weight:600}
.msg-bot-time{font-size:11px;color:var(--gray2);margin-top:4px}

/* 구글 출처 배지 */
.source-row{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.source-google{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--gray);cursor:pointer}
.g-icon{width:14px;height:14px;flex-shrink:0}
.source-link{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--gray);cursor:pointer;display:flex;align-items:center;gap:4px}
.source-link:hover{background:var(--lightgray)}

/* 반응 버튼 */
.react-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.react-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:var(--gray2);font-size:14px;transition:background .1s}
.react-btn:hover{background:var(--lightgray)}
.react-more{font-size:16px;color:var(--gray2);cursor:pointer;padding:0 4px}

/* 사용자 메시지 */
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bubble{background:var(--lightgray);border-radius:18px 18px 4px 18px;padding:10px 16px;font-size:14px;color:var(--black);max-width:60%;line-height:1.6}
.msg-user-time{font-size:11px;color:var(--gray2);margin-top:4px;text-align:right}

/* 리마인더 카드 */
.reminder-card{display:inline-flex;align-items:center;gap:8px;background:var(--greenl);border:1px solid #B8EDD3;border-radius:12px;padding:10px 14px;margin-top:6px;font-size:13px}
.rc-icon{font-size:16px}
.rc-title{font-weight:600;color:var(--green)}
.rc-sub{color:#2A9A5E;font-size:12px}

/* 타이핑 */
.typing-row{display:flex;align-items:center;gap:7px}
.typing-dots{display:flex;gap:4px;padding:10px 14px;background:var(--lightgray);border-radius:18px}
.tdot{width:7px;height:7px;border-radius:50%;background:#aaa;animation:bounce 1.2s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* 채팅창 하단 입력 */
.chat-footer{border-top:1px solid var(--border);background:var(--white);padding:12px 20px 14px;flex-shrink:0}
.chat-input-wrap{border:1.5px solid var(--border);border-radius:16px;padding:12px 14px;background:var(--white)}
.chat-input-wrap:focus-within{border-color:#BBBBBB}
.chat-input{width:100%;border:none;outline:none;font-size:14px;font-family:var(--sans);color:var(--black);background:transparent;resize:none;min-height:20px}
.chat-input::placeholder{color:#C8C8C8}
.chat-tool-row{display:flex;align-items:center;gap:6px;margin-top:10px}

/* API Key 입력 (작게) */
.apikey-row{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--lightgray);border-radius:8px;margin-bottom:8px}
.apikey-label{font-size:11px;color:var(--gray2);white-space:nowrap}
.apikey-inp{flex:1;border:none;background:transparent;font-size:11px;font-family:var(--mono);color:var(--black);outline:none}
.apikey-inp::placeholder{color:#C8C8C8}

/* 말투 설정 버튼 */
.tone-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:12px;color:var(--gray);cursor:pointer;font-family:var(--sans);transition:all .12s}
.tone-btn:hover{background:var(--lightgray)}
.tone-btn.active{border-color:#FF6B8A;background:#FFF0F3;color:#C0304A;font-weight:500}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="app">

  <!-- ══ 사이드바 ══ -->
  <aside class="sidebar">
    <div class="sb-logo-row">
      <div class="sb-logo-img">
        <div class="sb-logo-circle">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <span class="sb-logo-text">kanana</span>
      </div>
    </div>

    <div class="sb-section-label">대화 목록</div>
    <div class="sb-list" id="sbList">
      <div class="sb-item active" onclick="selectMate('nana',this)">
        <div class="sb-item-av">🐾</div>
        <div class="sb-item-info">
          <div class="sb-item-name">나나</div>
          <div class="sb-item-preview">안녕하세요 🔥 저는 카나나에서...</div>
        </div>
        <div class="sb-item-time">2분 전</div>
      </div>
      <div class="sb-item" onclick="selectMate('fortune',this)">
        <div class="sb-item-av" style="background:linear-gradient(135deg,#E8D5F5,#C9A8E8)">🔮</div>
        <div class="sb-item-info"><div class="sb-item-name">사주보는 카도사</div></div>
      </div>
      <div class="sb-item" onclick="selectMate('tarot',this)">
        <div class="sb-item-av" style="background:linear-gradient(135deg,#FFD5D5,#FFB0B0)">🃏</div>
        <div class="sb-item-info"><div class="sb-item-name">타로는 신비</div></div>
      </div>
      <div class="sb-item" onclick="selectMate('challenge',this)">
        <div class="sb-item-av" style="background:linear-gradient(135deg,#FFE8D5,#FFC8A0)">🎯</div>
        <div class="sb-item-info"><div class="sb-item-name">도전! 하루 하나</div></div>
      </div>
      <div class="sb-item" onclick="selectMate('study',this)">
        <div class="sb-item-av" style="background:linear-gradient(135deg,#D5E8FF,#A0C4FF)">📚</div>
        <div class="sb-item-info"><div class="sb-item-name">스터디 코칭</div></div>
      </div>
      <div class="sb-item" onclick="selectMate('insurance',this)">
        <div class="sb-item-av" style="background:linear-gradient(135deg,#D5F5E3,#A8E8C0)">🛡️</div>
        <div class="sb-item-info"><div class="sb-item-name">슬기로운 보험 생활</div></div>
      </div>
    </div>

    <div class="sb-more-row">
      <span class="sb-more-label">카나나 더 알아보기</span>
      <span class="sb-more-arrow">›</span>
    </div>

    <div class="sb-promo">
      <div class="sb-promo-title">우리를 이해하는 그룹 AI 카나나</div>
      <div class="sb-promo-desc">앱을 다운받고 친구들과 대화해 보세요.</div>
    </div>

    <div class="sb-user">
      <div class="sb-user-av">👤</div>
      <div>
        <div class="sb-user-name">신연서</div>
        <div class="sb-user-id">@white_taxi491</div>
      </div>
    </div>
  </aside>

  <!-- ══ 메인 ══ -->
  <div class="chat-main">

    <!-- 인트로 화면 -->
    <div class="intro-screen" id="introScreen">
      <div class="intro-avatar" id="introAv">🐾</div>
      <div class="intro-title" id="introTitle">쉽게 잠 못 드는 밤<br><strong>편히 잠들도록 도와줄게요!</strong></div>

      <div class="intro-input-wrap">
        <div class="apikey-row">
          <span class="apikey-label">API Key</span>
          <input type="password" id="apiKeyInput" class="apikey-inp" placeholder="sk-... (OpenAI) 또는 sk-ant-... (Claude) 입력 후 Enter"/>
        </div>
        <textarea id="introInput" class="intro-input" rows="1" placeholder="무엇이든 나나에게 물어보세요." oninput="autoResize(this)"></textarea>
        <div class="intro-tool-row">
          <button class="tool-attach" title="첨부">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="tool-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            이미지 만들기
          </button>
          <button class="tool-btn" onclick="quickReminder()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            리마인더 등록하기
          </button>
          <button class="tool-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            웹 검색하기
          </button>
          <div class="tool-icons-right">
            <div class="tool-icon-btn" style="background:#7B5EA7;border-radius:50%" title="플러스">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <div class="tool-icon-btn" title="구글 연동">
              <svg class="g-icon" viewBox="0 0 24 24" width="20" height="20">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
            </div>
            <button class="tool-send" onclick="sendFromIntro()">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="quick-actions" id="quickActions">
        <button class="qa-btn" onclick="quickSend('🔥 수면 명상 루틴')">🔥 수면 명상 루틴</button>
        <button class="qa-btn" onclick="quickSend('🎧 수면용 음악 추천')">🎧 수면용 음악 추천</button>
        <button class="qa-btn" onclick="quickSend('🌌 별자리 이미지 보여줘')">🌌 별자리 이미지 보여줘</button>
      </div>

      <!-- 말투 설정 (카나나 공식 기능) -->
      <div style="margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:660px">
        <div style="font-size:12px;color:#999;align-self:flex-start">나나 말투 설정</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="tone-btn active" id="tone-friend" onclick="setTone('friend',this)">😊 친구같은</button>
          <button class="tone-btn" id="tone-coach" onclick="setTone('coach',this)">💼 코치같은</button>
          <button class="tone-btn" id="tone-vibe" onclick="setTone('vibe',this)">🎉 분위기 메이커</button>
          <button class="tone-btn" id="tone-teen" onclick="setTone('teen',this)">😤 사춘기 같은</button>
          <button class="tone-btn" id="tone-custom" onclick="setTone('custom',this)">✏️ 직접 입력</button>
        </div>
        <input type="text" id="customToneInput" placeholder="원하는 말투를 직접 입력해보세요 (예: 다정한 언니처럼)" style="display:none;width:100%;padding:8px 12px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:13px;font-family:var(--sans);outline:none"/>
      </div>

      <div class="intro-help">
        <div><div class="help-text">카나나가 궁금하다면?</div><div class="help-sub">활용법을 알아보세요</div></div>
        <div class="help-btn">둘러보기</div>
      </div>
    </div>

    <!-- 대화 화면 -->
    <div class="chat-screen" id="chatScreen">
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-footer">
        <div class="chat-input-wrap">
          <textarea id="chatInput" class="chat-input" rows="1" placeholder="무엇이든 나나에게 물어보세요." oninput="autoResize(this)"></textarea>
          <div class="chat-tool-row">
            <button class="tool-attach">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="tool-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
              이미지 만들기
            </button>
            <button class="tool-btn" onclick="quickReminder()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              리마인더 등록하기
            </button>
            <button class="tool-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              웹 검색하기
            </button>
            <div class="tool-icons-right">
              <div class="tool-icon-btn" style="background:#7B5EA7;border-radius:50%">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 5v14M5 12h14"/></svg>
              </div>
              <div class="tool-icon-btn">
                <svg class="g-icon" viewBox="0 0 24 24" width="20" height="20">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
              </div>
              <button class="tool-send" onclick="sendFromChat()" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const MATE_DATA = {
  nana:      { name:'나나', emoji:'🐾', intro:'쉽게 잠 못 드는 밤\n<strong>편히 잠들도록 도와줄게요!</strong>', quick:['🔥 수면 명상 루틴','🎧 수면용 음악 추천','🌌 별자리 이미지 보여줘'], persona:'친구 같은 개인 AI 메이트 나나' },
  fortune:   { name:'사주보는 카도사', emoji:'🔮', intro:'오늘의 운세가 궁금하다면\n<strong>사주로 알아볼게요!</strong>', quick:['♈ 오늘 내 운세','💕 연애운 보기','💼 직업운 보기'], persona:'사주와 운세 전문 AI 메이트' },
  tarot:     { name:'타로는 신비', emoji:'🃏', intro:'타로 카드로\n<strong>오늘의 메시지를 받아보세요!</strong>', quick:['🃏 오늘의 타로','💘 연애 타로','🎯 목표 타로'], persona:'타로 카드 해석 전문 AI 메이트' },
  insurance: { name:'슬기로운 보험 생활', emoji:'🛡️', intro:'보험, 제대로 알고\n<strong>현명하게 가입해봐요!</strong>', quick:['🛡️ 내 보험 점검하기','📊 보험 상품 비교','💡 꼭 필요한 보험은?'], persona:'마이데이터 기반 보험 분석 전문 AI 메이트 (해빗팩토리와 함께)' },
  challenge: { name:'도전! 하루 하나', emoji:'🎯', intro:'오늘도 한 걸음씩\n<strong>함께 도전해요!</strong>', quick:['🌅 오늘의 도전 미션','💪 운동 루틴','📖 독서 습관'], persona:'자기계발과 습관 형성 AI 메이트' },
  study:     { name:'스터디 코칭', emoji:'📚', intro:'공부가 막막할 때\n<strong>함께 해결해 드릴게요!</strong>', quick:['📝 오늘 공부 계획','🧠 집중력 높이기','📖 암기법 알려줘'], persona:'이병훈 소장과 함께하는 학습 지원 AI 메이트' },
};

let currentMate = 'nana';
let history = [];
let isLoading = false;
let apiKey = sessionStorage.getItem('kn_key') || '';

const $ = id => document.getElementById(id);

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function selectMate(id, el) {
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  currentMate = id;
  history = [];
  const m = MATE_DATA[id];
  $('introAv').textContent = m.emoji;
  $('introTitle').innerHTML = m.intro.replace('\n','<br>');
  $('quickActions').innerHTML = m.quick.map(q=>`<button class="qa-btn" onclick="quickSend('${q}')">${q}</button>`).join('');
  $('introScreen').style.display = '';
  $('chatScreen').classList.remove('show');
  $('chatBody').innerHTML = '';
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function now(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function scrollBot(){ const b=$('chatBody'); b.scrollTop=b.scrollHeight; }

function addUserMsg(text) {
  const el = document.createElement('div');
  el.innerHTML = `<div class="msg-user"><div><div class="msg-user-bubble">${esc(text)}</div><div class="msg-user-time">${now()}</div></div></div>`;
  $('chatBody').appendChild(el); scrollBot();
}

function addBotMsg(html, opts={}) {
  const m = MATE_DATA[currentMate];
  const sources = opts.sources||[];
  const reminder = opts.reminder||'';
  const el = document.createElement('div');
  el.className = 'msg-bot';
  el.innerHTML = `
    <div class="msg-bot-header">
      <div class="msg-bot-av">${m.emoji}</div>
      <div class="msg-bot-name">${m.name}</div>
    </div>
    <div class="msg-bot-text">${html}${reminder?`<br><div class="reminder-card"><span class="rc-icon">🔔</span><div><div class="rc-title">알림 등록 완료!</div><div class="rc-sub">${esc(reminder)}</div></div></div>`:''}
    </div>
    ${sources.length?`<div class="source-row">
      <div class="source-google"><svg class="g-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> 출처</div>
      ${sources.map(s=>`<div class="source-link">🔗 ${esc(s)}</div>`).join('')}
    </div>`:''}
    <div class="msg-bot-time">${now()}</div>
    <div class="react-row">
      <button class="react-btn" title="답장">↩</button>
      <button class="react-btn" title="이모지">😊</button>
      <button class="react-btn" title="복사">⎘</button>
      <button class="react-btn" title="링크">🔗</button>
      <span class="react-more">···</span>
    </div>`;
  $('chatBody').appendChild(el); scrollBot();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing-row'; el.id = 'typing';
  el.innerHTML = `<div class="msg-bot-av">${MATE_DATA[currentMate].emoji}</div><div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  $('chatBody').appendChild(el); scrollBot();
}
function removeTyping(){ $('typing')?.remove(); }

const SYSTEM = () => {
  const m = MATE_DATA[currentMate];
  const tone = getToneInstruction();
  return `당신은 카카오 카나나의 AI 메이트 '${m.name}'입니다. ${m.persona}.

[말투 설정 — 반드시 준수]
${tone}

사용자 이름: 신연서님. 현재 위치: 서울 성동구 하왕십리동.
리마인더 등록 요청 시 [REMINDER:내용:날짜시간] 형식으로 응답에 포함하세요.
웹 검색이 필요한 경우 답변 마지막에 [SOURCES:출처1,출처2] 형식으로 포함하세요.
답변 마지막에 자연스럽게 관련 후속 질문을 1~2개 제안하세요.`;
};

async function callAPI(text) {
  const key = apiKey || $('apiKeyInput').value.trim();
  if (!key) return '⚠️ API Key를 입력창에 입력해 주세요. (OpenAI: sk-... / Claude: sk-ant-...)';

  const isAnthropic = key.startsWith('sk-ant');
  const messages = [...history, {role:'user', content:text}];

  if (isAnthropic) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM(), messages })
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    return (d.content||[]).map(b=>b.text||'').join('');
  } else {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body: JSON.stringify({ model:'gpt-4o', max_tokens:1000, messages:[{role:'system',content:SYSTEM()},...messages] })
    });
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    return d.choices?.[0]?.message?.content||'';
  }
}

async function sendMessage(text) {
  text = text.trim(); if (!text || isLoading) return;
  isLoading = true;

  // 인트로 → 채팅 화면 전환
  $('introScreen').style.display = 'none';
  $('chatScreen').classList.add('show');

  addUserMsg(text);
  history.push({role:'user', content:text});
  addTyping();

  try {
    const raw = await callAPI(text);
    removeTyping();
    history.push({role:'assistant', content:raw});

    // 파싱
    const reminderMatch = raw.match(/\[REMINDER:([^:]+):([^\]]+)\]/);
    const reminder = reminderMatch ? `${reminderMatch[1]} — ${reminderMatch[2]}` : '';
    const sourcesMatch = raw.match(/\[SOURCES:([^\]]+)\]/);
    const sources = sourcesMatch ? sourcesMatch[1].split(',').map(s=>s.trim()).filter(Boolean) : [];
    const useWebSearch = /검색|날씨|뉴스|오늘|최신|현재|근처|맛집/.test(text);

    let clean = raw
      .replace(/\[REMINDER:[^\]]*\]/g,'')
      .replace(/\[SOURCES:[^\]]*\]/g,'')
      .trim();

    // 마크다운 변환
    const html = clean
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');

    addBotMsg(html, {
      reminder,
      sources: sources.length ? sources : (useWebSearch ? ['오늘 인기있는 음식','오늘 날씨 서울 성동구 하왕십리동','오늘의 추천 메뉴'] : [])
    });

    if (history.length > 12) { history = history.slice(-10); }

  } catch(e) {
    removeTyping();
    addBotMsg(`잠시 오류가 발생했어요 😥<br><small style="color:#aaa">${esc(e.message)}</small>`);
  }
  isLoading = false;
}

function sendFromIntro() { const t=$('introInput').value; $('introInput').value=''; $('introInput').style.height=''; sendMessage(t); }
function sendFromChat()  { const t=$('chatInput').value;  $('chatInput').value='';  $('chatInput').style.height=''; sendMessage(t); }
function quickSend(t)    { sendMessage(t); }
function quickReminder() { sendMessage('내일 오전 9시에 병원 예약 리마인더 등록해줘'); }

// 입력창 Enter
['introInput','chatInput'].forEach(id=>{
  $(id)?.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); id==='introInput'?sendFromIntro():sendFromChat(); }
  });
});

// API Key 저장
$('apiKeyInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    apiKey=$('apiKeyInput').value.trim();
    if(apiKey){ sessionStorage.setItem('kn_key',apiKey); $('apiKeyInput').value='(저장됨)'; }
  }
});

if(apiKey) $('apiKeyInput').placeholder='(저장된 키 사용 중)';

// ── 말투 설정 ─────────────────────────────────────────────────────────
const TONES = {
  friend: '친구처럼 편하고 친근하게, 반말로',
  coach:  '전문적이고 체계적으로, 코치처럼 동기부여하며',
  vibe:   '분위기를 띄우고 유쾌하게, 이모지를 많이 써서',
  teen:   '약간 삐딱하고 반항기 있게, 사춘기 느낌으로',
  custom: '',
};
let currentTone = 'friend';

function setTone(t, btn) {
  currentTone = t;
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const customInput = $('customToneInput');
  if (t === 'custom') {
    customInput.style.display = 'block';
    customInput.focus();
  } else {
    customInput.style.display = 'none';
  }
}

function getToneInstruction() {
  if (currentTone === 'custom') {
    const v = $('customToneInput')?.value?.trim();
    return v ? v + '로 말해줘.' : TONES.friend;
  }
  return TONES[currentTone] || TONES.friend;
}
</script>
</body>
</html>
